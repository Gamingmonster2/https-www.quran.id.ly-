        }, 5000);
    };

    window.hidePwaPrompt = function() {
        div.style.top = '-100px'; // Slide Up

            deferredPrompt.userChoice.then(function(choiceResult) {

        if(window.showPwaPrompt) window.showPwaPrompt();
    }, 3000);

                700: '#1a1a1a', // Borders / subtle areas
                600: '#282828',
                500: '#404040',
              }
            },
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
              serif: ['Amiri', 'serif'],
            },
            boxShadow: {
              'gold-glow': '0 0 20px rgba(212, 175, 55, 0.15)',
              'gold-glow-lg': '0 0 35px rgba(212, 175, 55, 0.25)',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbars */

      ::-webkit-scrollbar-track { background: #080808; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        background-color: #080808;

        overflow-x: hidden;
      }

      /* Animated Background Pattern */
      .bg-pattern {
        background-image: radial-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 0);
        background-size: 24px 24px;
      }

      /* Range Slider Styling */

      input[type=range]::-webkit-slider-thumb { 
        -webkit-appearance: none; 
        height: 14px; width: 14px;

        box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        transition: transform 0.1s;

      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.2);

      input[type=range]::-webkit-slider-runnable-track {
        width: 100%; height: 4px; cursor: pointer; background: #222; border-radius: 2px;
      }

      /* Visualizer wave bars animation */
      @keyframes visualizer-bounce {
        0%, 100% { transform: scaleY(0.2); }
        50% { transform: scaleY(1); }
      }
      .visualizer-bar {
        transform-origin: bottom;
        animation: visualizer-bounce 1.2s ease-in-out infinite;
      }
      .visualizer-bar:nth-child(2) { animation-delay: 0.15s; }
      .visualizer-bar:nth-child(3) { animation-delay: 0.3s; }
      .visualizer-bar:nth-child(4) { animation-delay: 0.45s; }
      .visualizer-bar:nth-child(5) { animation-delay: 0.2s; }
      .visualizer-bar:nth-child(6) { animation-delay: 0.35s; }
      .visualizer-bar:nth-child(7) { animation-delay: 0.1s; }
      .visualizer-bar:nth-child(8) { animation-delay: 0.5s; }
    </style>
  </head>
  <body class="relative min-h-screen bg-pattern">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo } = React;

      // API Endpoints
      const API_BASE_URL = 'https://mp3quran.net/api/v3';

      // SVG Icons Pack
      const Icons = {
        Play: (props) => <svg {...props} fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
        Pause: (props) => <svg {...props} fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>,
        Next: (props) => <svg {...props} fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>,
        Prev: (props) => <svg {...props} fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>,
        Search: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
        Grid: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>,
        List: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></svg>,
        Trophy: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34M12 2a4 4 0 0 1 4 4v5a4 4 0 0 1-4 4 4 4 0 0 1-4-4V6a4 4 0 0 1 4-4z"/></svg>,
        Close: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
        Download: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
        VolumeHigh: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" /></svg>,
        VolumeMute: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" /></svg>,
        Loop: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3-3-3" /></svg>,
        Shuffle: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M18.4 4H21v2.6M4 20l17-17M4 4l5 5m4 4l8 8M21 20v-2.6H18.4" /></svg>,
        Back: (props) => <svg {...props} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
        LogoIcon: (props) => (
          <svg {...props} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="url(#goldGradient)" strokeWidth="3" fill="#080808"/>
            <path d="M50 18 L59 36 L79 36 L63 48 L69 68 L50 56 L31 68 L37 48 L21 36 L41 36 Z" fill="url(#goldGradient)"/>
            <circle cx="50" cy="50" r="14" fill="#080808" stroke="url(#goldGradient)" strokeWidth="1"/>
            <path d="M45 50 Q50 42 55 50 Q50 58 45 50 Z" fill="url(#goldGradient)"/>
            <defs>
              <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#fbeba3" />
                <stop offset="50%" stopColor="#d4af37" />
                <stop offset="100%" stopColor="#8f6206" />
              </linearGradient>
            </defs>
          </svg>
        )
      };

      // --- MAIN COMPONENT ---
      const App = () => {
        const [viewMode, setViewMode] = useState('grid'); // grid, list, rank
        const [reciters, setReciters] = useState([]);
        const [selectedReciter, setSelectedReciter] = useState(null);
        const [moshafList, setMoshafList] = useState([]);
        const [activeMoshafIndex, setActiveMoshafIndex] = useState(0);
        const [playlist, setPlaylist] = useState([]);
        const [currentTrackIndex, setCurrentTrackIndex] = useState(null);
        const [isLoading, setIsLoading] = useState(false);
        const [surahMap, setSurahMap] = useState(new Map());
        const [searchQuery, setSearchQuery] = useState('');

        // Audio Player States
        const [isPlaying, setIsPlaying] = useState(false);
        const [progress, setProgress] = useState(0);
        const [duration, setDuration] = useState(0);
        const [currentTime, setCurrentTime] = useState(0);
        const [volume, setVolume] = useState(0.8);
        const [isMuted, setIsMuted] = useState(false);
        const [isLooping, setIsLooping] = useState(false);
        const [isShuffled, setIsShuffled] = useState(false);

        const audioRef = useRef(null);

        // Fetch Reciters and Surah Names
        useEffect(() => {
          const init = async () => {
            try {
              const [reciterRes, surahRes] = await Promise.all([
                fetch(`${API_BASE_URL}/reciters?language=ar`),
                fetch(`${API_BASE_URL}/suwar?language=ar`)
              ]);
              const reciterData = await reciterRes.json();
              const surahData = await surahRes.json();

              // Inject mock popularity metrics for Libyan/General listeners
              const processedReciters = reciterData.reciters.map(r => ({
                ...r,
                listeners: Math.floor(Math.random() * 850000) + 150000
              }));

              setReciters(processedReciters);

              const map = new Map();
              surahData.suwar.forEach(s => map.set(s.id, s));
              setSurahMap(map);
            } catch (err) {
              console.error("Initialization Error: ", err);
            }
          };
          init();
        }, []);

        // Load Surahs when Reciter is selected
        const handleSelectReciter = async (reciter) => {
          setSelectedReciter(reciter);
          setIsLoading(true);
          try {
            const response = await fetch(`${API_BASE_URL}/reciters?language=ar&reciter=${reciter.id}`);
            const data = await response.json();
            const details = data.reciters[0];

            if (details && details.moshaf && details.moshaf.length) {
              setMoshafList(details.moshaf);
              setActiveMoshafIndex(0);
              const m = details.moshaf[0];
              const list = m.surah_list.split(',').map(Number).map(id => ({
                id,
                name: surahMap.get(id)?.name || `سورة ${id}`,
                reciterName: reciter.name,
                audioUrl: `${m.server}/${String(id).padStart(3, '0')}.mp3`
              }));
              setPlaylist(list);
              setCurrentTrackIndex(null);
            } else {
              setMoshafList([]);
              setPlaylist([]);
            }
          } catch (e) {
            console.error("Error loading surahs: ", e);
          }
          setIsLoading(false);
        };

        // Handle changing the active Moshaf (narration/type) for the current sheikh
        const handleMoshafChange = (index) => {
          if (!moshafList[index]) return;
          setActiveMoshafIndex(index);
          const m = moshafList[index];
          const list = m.surah_list.split(',').map(Number).map(id => ({
            id,
            name: surahMap.get(id)?.name || `سورة ${id}`,
            reciterName: selectedReciter.name,
            audioUrl: `${m.server}/${String(id).padStart(3, '0')}.mp3`
          }));
          setPlaylist(list);
          setCurrentTrackIndex(null);
        };

        // Track changes
        const currentTrack = useMemo(() => 
          (currentTrackIndex !== null && playlist[currentTrackIndex]) ? playlist[currentTrackIndex] : null
        , [currentTrackIndex, playlist]);

        // Audio Engine Side-effects
        useEffect(() => {
          if (currentTrack && audioRef.current) {
            audioRef.current.src = currentTrack.audioUrl;
            audioRef.current.load();
            audioRef.current.play()
              .then(() => setIsPlaying(true))
              .catch(err => console.log("Playback interrupted or blocked: ", err));
          }
        }, [currentTrack]);

        useEffect(() => {
          if (audioRef.current) {
            audioRef.current.volume = isMuted ? 0 : volume;
          }
        }, [volume, isMuted]);

        useEffect(() => {
          if (audioRef.current) {
            audioRef.current.loop = isLooping;
          }
        }, [isLooping]);

        const togglePlay = () => {
          if (!audioRef.current || !currentTrack) return;
          if (isPlaying) {
            audioRef.current.pause();
            setIsPlaying(false);
          } else {
            audioRef.current.play().then(() => setIsPlaying(true));
          }
        };

        const handleTimeUpdate = () => {
          if (!audioRef.current) return;
          setCurrentTime(audioRef.current.currentTime);
          setProgress((audioRef.current.currentTime / audioRef.current.duration) * 100 || 0);
        };

        const handleLoadedMetadata = () => {
          if (!audioRef.current) return;
          setDuration(audioRef.current.duration);
        };

        const handleAudioEnded = () => {
          setIsPlaying(false);
          handleNext();
        };

        const handleNext = () => {
          if (playlist.length === 0) return;
          if (isShuffled) {
            const randomIndex = Math.floor(Math.random() * playlist.length);
            setCurrentTrackIndex(randomIndex);
          } else {
            setCurrentTrackIndex(prev => (prev !== null && prev < playlist.length - 1) ? prev + 1 : 0);
          }
        };

        const handlePrev = () => {
          if (playlist.length === 0) return;
          setCurrentTrackIndex(prev => (prev !== null && prev > 0) ? prev - 1 : playlist.length - 1);
        };

        const handleSeek = (e) => {
          if (!audioRef.current || !duration) return;
          const newTime = (e.target.value / 100) * duration;
          audioRef.current.currentTime = newTime;
          setProgress(e.target.value);
        };

        const handleDownload = async (track) => {
          if (!track) return;
          try {
            // Attempt clean programmatic download
            const response = await fetch(track.audioUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `${track.reciterName} - ${track.name}.mp3`;
            document.body.appendChild(a);
            a.click();
            a.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
          } catch (error) {
            // Fallback to direct tab download if CORS triggers
            window.open(track.audioUrl, '_blank');
          }
        };

        const formatTime = (seconds) => {
          if (isNaN(seconds)) return "00:00";
          const m = Math.floor(seconds / 60);
          const s = Math.floor(seconds % 60);
          return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        // Filter and Sort Reciters
        const processedRecitersList = useMemo(() => {
          let list = [...reciters].filter(r => r.name.toLowerCase().includes(searchQuery.toLowerCase()));
          if (viewMode === 'list') {
            list.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
          } else if (viewMode === 'rank') {
            list.sort((a, b) => b.listeners - a.listeners);
          }
          return list;
        }, [reciters, searchQuery, viewMode]);

        return (
          <div className="flex flex-col min-h-screen">
            {/* Hidden Audio Engine */}
            <audio 
              ref={audioRef}
              onTimeUpdate={handleTimeUpdate}
              onLoadedMetadata={handleLoadedMetadata}
              onEnded={handleAudioEnded}
            />

            {/* Premium Navigation Header */}
            <header className="sticky top-0 z-40 bg-brand-900/90 backdrop-blur-md border-b border-brand-700 h-20 flex items-center">
              <div className="container mx-auto px-4 sm:px-6 flex justify-between items-center">
                
                {/* Brand Logo & Name */}
                <div className="flex items-center gap-3">
                  <Icons.LogoIcon className="w-12 h-12 drop-shadow-gold-glow" />
                  <div>
                    <h1 className="text-xl font-bold text-white tracking-wide font-sans flex items-center gap-2">
                      القرآن الكريم
                      <span className="text-xs bg-gold-500/10 text-gold-400 border border-gold-500/20 px-2 py-0.5 rounded-full font-mono">ليبي</span>
                    </h1>
                    <p className="text-xs text-gold-500/80 tracking-widest font-mono uppercase">quran.id.ly</p>
                  </div>
                </div>

                {/* View Switchers */}
                <div className="bg-brand-800 rounded-full p-1 border border-brand-700 flex gap-1">
                  {[
                    { id: 'grid', icon: Icons.Grid, label: 'الشبكة' },
                    { id: 'list', icon: Icons.List, label: 'الأبجدي' },
                    { id: 'rank', icon: Icons.Trophy, label: 'الأكثر استماعاً' }
                  ].map(v => (
                    <button
                      key={v.id}
                      onClick={() => setViewMode(v.id)}
                      title={v.label}
                      className={`
                        p-2.5 rounded-full transition-all duration-300 flex items-center gap-1.5
                        ${viewMode === v.id 
                          ? 'bg-gold-500 text-brand-950 shadow-gold-glow font-bold' 
                          : 'text-gray-400 hover:text-gold-400 hover:bg-brand-700'}
                      `}
                    >
                      <v.icon className="w-4 h-4" />
                      <span className="text-xs hidden md:inline">{v.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            </header>

            {/* Main Application Container */}
            <main className="flex-1 container mx-auto px-4 sm:px-6 py-6 pb-40">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                
                {/* Right Area: Reciter Search & Grid/List (Spans 8 cols on large screens) */}
                <div className={`lg:col-span-8 ${selectedReciter ? 'hidden lg:block' : 'block'}`}>
                  
                  {/* Search and Filters bar */}
                  <div className="mb-6 bg-brand-800 p-4 rounded-2xl border border-brand-700 shadow-xl">
                    <div className="relative">
                      <Icons.Search className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gold-500" />
                      <input 
                        type="text" 
                        placeholder="ابحث باسم القارئ أو الشيخ..."
                        value={searchQuery}
                        onChange={e => setSearchQuery(e.target.value)}
                        className="w-full pr-12 pl-4 py-3.5 rounded-xl bg-brand-900 border border-brand-700 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-all text-base"
                      />
                    </div>
                  </div>

                  {/* Reciters List Grid */}
                  {processedRecitersList.length === 0 ? (
                    <div className="text-center py-20 bg-brand-800 rounded-2xl border border-brand-700">
                      <p className="text-gray-400 text-lg">لم يتم العثور على قراء يطابقون بحثك.</p>
                    </div>
                  ) : (
                    <div className={
                      viewMode === 'grid' 
                        ? "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" 
                        : "flex flex-col gap-3"
                    }>
                      {processedRecitersList.map((reciter, idx) => {
                        const isSelected = selectedReciter?.id === reciter.id;
                        return (
                          <div
                            key={reciter.id}
                            onClick={() => handleSelectReciter(reciter)}
                            className={`
                              cursor-pointer relative overflow-hidden rounded-2xl border transition-all duration-300 group p-4 flex
                              ${isSelected 
                                ? 'bg-brand-800 border-gold-500 shadow-gold-glow scale-[0.98]' 
                                : 'bg-brand-800 border-brand-700 hover:border-gold-500/40 hover:bg-brand-800/80'}
                              ${viewMode === 'grid' ? 'flex-col items-center text-center gap-3' : 'items-center gap-4'}
                            `}
                          >
                            {/* Decorative Corner Element */}
                            <div className="absolute -top-6 -left-6 w-12 h-12 bg-gold-500/10 rounded-full group-hover:scale-150 transition-transform duration-500" />

                            {/* Avatar Icon */}
                            <div className={`
                              rounded-full flex items-center justify-center font-serif font-bold text-gold-100 transition-transform duration-300 group-hover:scale-105
                              ${viewMode === 'grid' 
                                ? 'w-16 h-16 text-2xl bg-gradient-to-br from-brand-700 to-brand-900 border border-brand-600' 
                                : 'w-12 h-12 text-xl bg-brand-700'}
                            `}>
                              {reciter.name.charAt(0)}
                            </div>

                            {/* Reciter Info */}
                            <div className="flex-1 w-full min-w-0">
                              <h3 className="font-bold text-gray-100 group-hover:text-gold-400 transition-colors text-sm sm:text-base truncate">
                                {reciter.name}
                              </h3>
                              <p className="text-xs text-gray-500 mt-1 truncate">
                                {reciter.rewaya || "برواية حفص عن عاصم"}
                              </p>
                              {viewMode === 'rank' && (
                                <span className="inline-flex items-center gap-1 text-[11px] text-gold-500/80 mt-1 bg-gold-500/5 px-2 py-0.5 rounded-full">
                                  {reciter.listeners.toLocaleString()} استماع
                                </span>
                              )}
                            </div>

                            {/* Selection Status */}
                            {isSelected && (
                              <div className="w-2.5 h-2.5 rounded-full bg-gold-500 shadow-gold-glow" />
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                {/* Left Area: Surah Playlist Drawer/Sidebar (Spans 4 cols) */}
                {selectedReciter && (
                  <div className="lg:col-span-4 block h-full">
                    <div className="bg-brand-800 rounded-3xl border border-brand-700 shadow-2xl overflow-hidden flex flex-col max-h-[75vh] lg:max-h-[80vh] sticky top-28">
                      
                      {/* Close / Back button header */}
                      <div className="p-4 border-b border-brand-700 bg-brand-900/50 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <button 
                            onClick={() => setSelectedReciter(null)}
                            className="p-2 hover:bg-brand-700 rounded-full text-gold-500 transition-colors"
                            title="العودة للقراء"
                          >
                            <Icons.Back className="w-5 h-5" />
                          </button>
                          <div>
                            <h2 className="text-base font-bold text-white truncate max-w-[200px]">{selectedReciter.name}</h2>
                            <p className="text-xs text-gray-400">قائمة السور المتاحة</p>
                          </div>
                        </div>
                        <span className="text-xs bg-brand-700 text-gold-400 px-2.5 py-1 rounded-full font-mono">
                          {playlist.length} سورة
                        </span>
                      </div>

                      {/* Complete Quran / Moshaf Selector Menu */}
                      {moshafList.length > 1 && (
                        <div className="px-4 py-3 border-b border-brand-700 bg-brand-900/30">
                          <label className="block text-[11px] text-gold-500 mb-1.5 font-bold">رواية / مصحف القارئ:</label>
                          <select
                            value={activeMoshafIndex}
                            onChange={(e) => handleMoshafChange(Number(e.target.value))}
                            className="w-full bg-brand-900 border border-brand-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-all"
                          >
                            {moshafList.map((m, idx) => (
                              <option key={idx} value={idx} className="bg-brand-800">
                                {m.name} ({m.surah_total} سورة)
                              </option>
                            ))}
                          </select>
                        </div>
                      )}

                      {/* Surah List Scroll Area */}
                      <div className="flex-1 overflow-y-auto p-3 space-y-2">
                        {isLoading ? (
                          <div className="flex flex-col items-center justify-center py-20 gap-3">
                            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-gold-500"></div>
                            <span className="text-xs text-gray-400">جاري تحميل قائمة السور...</span>
                          </div>
                        ) : playlist.length === 0 ? (
                          <div className="text-center py-10 text-gray-500 text-sm">
                            لا توجد تلاوات متوفرة لهذا القارئ حالياً.
                          </div>
                        ) : (
                          playlist.map((track, idx) => {
                            const isCurrent = currentTrackIndex === idx;
                            return (
                              <div
                                key={track.id}
                                className={`
                                  w-full rounded-xl p-3 transition-all flex items-center justify-between group border
                                  ${isCurrent 
                                    ? 'bg-gradient-to-l from-gold-600/20 to-brand-900 border-gold-500 shadow-gold-glow' 
                                    : 'bg-brand-900/40 border-transparent hover:border-brand-700 hover:bg-brand-900/90'}
                                `}
                              >
                                {/* Surah Name Trigger */}
                                <button 
                                  onClick={() => setCurrentTrackIndex(idx)}
                                  className="flex-1 text-right flex items-center gap-3 min-w-0"
                                >
                                  <div className={`
                                    w-8 h-8 rounded-lg flex items-center justify-center font-serif text-xs border transition-colors
                                    ${isCurrent ? 'bg-gold-500 text-brand-950 border-gold-400 font-bold' : 'bg-brand-800 text-gray-400 border-brand-700'}
                                  `}>
                                    {track.id}
                                  </div>
                                  <div className="min-w-0">
                                    <p className={`font-serif text-base font-bold truncate ${isCurrent ? 'text-gold-400' : 'text-gray-200'}`}>
                                      {track.name}
                                    </p>
                                    <p className="text-[10px] text-gray-500">تلاوة مرتلة</p>
                                  </div>
                                </button>

                                {/* Play / Download Actions */}
                                <div className="flex items-center gap-1">
                                  <button
                                    onClick={() => handleDownload(track)}
                                    className="p-2 text-gray-400 hover:text-gold-400 rounded-full hover:bg-brand-700 transition-colors"
                                    title="تحميل السورة"
                                  >
                                    <Icons.Download className="w-4 h-4" />
                                  </button>
                                  <button
                                    onClick={() => {
                                      if (isCurrent) togglePlay();
                                      else setCurrentTrackIndex(idx);
                                    }}
                                    className={`p-2 rounded-full transition-all ${isCurrent ? 'text-gold-400 bg-gold-500/10' : 'text-gray-400 hover:text-white hover:bg-brand-700'}`}
                                  >
                                    {isCurrent && isPlaying ? (
                                      <Icons.Pause className="w-4 h-4" />
                                    ) : (
                                      <Icons.Play className="w-4 h-4" />
                                    )}
                                  </button>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </main>

            {/* Premium Sticky Audio Player Footer */}
            {currentTrack && (
              <div className="fixed bottom-0 left-0 w-full z-50 bg-brand-900/95 backdrop-blur-xl border-t border-gold-500/30 shadow-[0_-10px_40px_rgba(0,0,0,0.9)] px-4 py-4 md:py-5 transition-all duration-300">
                <div className="container mx-auto max-w-6xl">
                  
                  {/* Top: Progress Bar Slider */}
                  <div className="flex items-center gap-3 mb-3">
                    <span className="text-xs text-gray-400 font-mono w-10 text-right">{formatTime(currentTime)}</span>
                    <div className="flex-1 relative group py-2">
                      <input 
                        type="range" 
                        min="0" 
                        max="100" 
                        value={progress} 
                        onChange={handleSeek}
                        className="w-full h-1 cursor-pointer accent-gold-500"
                      />
                    </div>
                    <span className="text-xs text-gray-400 font-mono w-10 text-left">{formatTime(duration)}</span>
                  </div>

                  {/* Bottom Controls Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
                    
                    {/* Left Panel: Track Meta Info & Sound Waves */}
                    <div className="md:col-span-4 flex items-center gap-4 justify-between md:justify-start">
                      <div className="flex items-center gap-3 min-w-0">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-gold-500 to-gold-700 flex items-center justify-center text-brand-950 font-bold font-serif text-lg shadow-gold-glow">
                          {currentTrack.id}
                        </div>
                        <div className="min-w-0">
                          <h4 className="text-gold-400 font-bold font-serif text-lg truncate">{currentTrack.name}</h4>
                          <p className="text-gray-400 text-xs truncate">{currentTrack.reciterName}</p>
                        </div>
                      </div>

                      {/* Animated Audio Visualizer Bars */}
                      <div className="flex items-end gap-1 h-6 px-3">
                        {[1, 2, 3, 4, 5, 6, 7, 8].map(bar => (
                          <div 
                            key={bar} 
                            className={`w-1 bg-gold-500 rounded-full visualizer-bar`}
                            style={{ 
                              height: '100%',
                              animationPlayState: isPlaying ? 'running' : 'paused'
                            }}
                          />
                        ))}
                      </div>
                    </div>

                    {/* Middle Panel: Playback Controls */}
                    <div className="md:col-span-4 flex flex-col items-center gap-1">
                      <div className="flex items-center gap-4 sm:gap-6">
                        {/* Shuffle Trigger */}
                        <button 
                          onClick={() => setIsShuffled(!isShuffled)}
                          className={`p-2 rounded-full transition-colors ${isShuffled ? 'text-gold-400 bg-gold-500/10' : 'text-gray-500 hover:text-white'}`}
                          title="تشغيل عشوائي"
                        >
                          <Icons.Shuffle className="w-5 h-5" />
                        </button>

                        {/* Prev Button */}
                        <button 
                          onClick={handlePrev}
                          className="p-2 text-gray-400 hover:text-white transition-colors"
                          title="السورة السابقة"
                        >
                          <Icons.Prev className="w-6 h-6 transform rotate-180" />
                        </button>

                        {/* Play/Pause Main Button */}
                        <button 
                          onClick={togglePlay}
                          className="w-14 h-14 rounded-full bg-gradient-to-br from-gold-400 to-gold-600 text-brand-950 flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-gold-glow-lg"
                        >
                          {isPlaying ? (
                            <Icons.Pause className="w-6 h-6" />
                          ) : (
                            <Icons.Play className="w-6 h-6 ml-1" />
                          )}
                        </button>

                        {/* Next Button */}
                        <button 
                          onClick={handleNext}
                          className="p-2 text-gray-400 hover:text-white transition-colors"
                          title="السورة التالية"
                        >
                          <Icons.Next className="w-6 h-6 transform rotate-180" />
                        </button>

                        {/* Repeat/Loop Trigger */}
                        <button 
                          onClick={() => setIsLooping(!isLooping)}
                          className={`p-2 rounded-full transition-colors ${isLooping ? 'text-gold-400 bg-gold-500/10' : 'text-gray-500 hover:text-white'}`}
                          title="تكرار السورة"
                        >
                          <Icons.Loop className="w-5 h-5" />
                        </button>
                      </div>
                    </div>

                    {/* Right Panel: Volume & Download Actions */}
                    <div className="md:col-span-4 flex items-center justify-between md:justify-end gap-4">
                      
                      {/* Volume controls */}
                      <div className="flex items-center gap-2">
                        <button 
                          onClick={() => setIsMuted(!isMuted)}
                          className="text-gray-400 hover:text-gold-400 transition-colors"
                        >
                          {isMuted ? <Icons.VolumeMute className="w-5 h-5" /> : <Icons.VolumeHigh className="w-5 h-5" />}
                        </button>
                        <input 
                          type="range" 
                          min="0" 
                          max="1" 
                          step="0.05"
                          value={isMuted ? 0 : volume} 
                          onChange={(e) => {
                            setVolume(parseFloat(e.target.value));
                            setIsMuted(false);
                          }}
                          className="w-20 md:w-24 h-1 accent-gold-500 cursor-pointer"
                        />
                      </div>

                      {/* External Download Button */}
                      <button
                        onClick={() => handleDownload(currentTrack)}
                        className="flex items-center gap-2 bg-gold-500 hover:bg-gold-400 text-brand-950 font-bold px-4 py-2 rounded-xl transition-all text-xs"
                        title="تحميل الملف الصوتي"
                      >
                        <Icons.Download className="w-4 h-4" />
                        <span className="hidden sm:inline">تحميل</span>
                      </button>

                    </div>
                  </div>

                </div>
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
