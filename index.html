    window.showPwaPrompt = function() {
        div.style.top = '20px'; // Slide Down
        
        // Auto Hide after 5 seconds
        setTimeout(function(){
             window.hidePwaPrompt();
        }, 5000);
    };

    // Hide Function
    window.hidePwaPrompt = function() {
        div.style.top = '-100px'; // Slide Up
    };

    // Install Click Logic
    btn.addEventListener('click', function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(choiceResult) {
                deferredPrompt = null;
                window.hidePwaPrompt();
            });
        }
    });

    // Close Click
    close.addEventListener('click', function() {
        window.hidePwaPrompt();
    });
  }

  // Initialize
  window.addEventListener('load', function() {
      createInstallUI();
      
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        var swCode = "self.addEventListener('install', e => e.waitUntil(self.skipWaiting())); self.addEventListener('activate', e => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', e => {});";
        var swBlob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob));
      }
  });

  // Capture Install Event
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    
    // Show Prompt after 3 seconds delay
    setTimeout(function() {
        if(window.showPwaPrompt) window.showPwaPrompt();
    }, 3000);
  });

})();

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <button onclick="setViewMode('rank')" id="btn-view-rank" class="p-2 rounded-lg transition-all hover:bg-gold-100/50 dark:hover:bg-dark-700/50 opacity-60 hover:opacity-100 text-gray-600 dark:text-gray-300" title="الأكثر استماعاً">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                </div>

                <div class="w-px h-6 bg-gold-600/30"></div>

                <!-- Theme Switcher -->
                <button onclick="toggleTheme()" id="theme-toggle" class="p-2.5 rounded-xl transition-all border bg-white border-gold-200 text-gold-600 hover:bg-gold-50 dark:bg-dark-800 dark:border-dark-700 dark:text-gold-400 dark:hover:bg-dark-700">
                    <svg id="theme-icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg id="theme-icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-hidden grid grid-cols-1 md:grid-cols-[1fr_350px] lg:grid-cols-[1fr_400px] relative">
        
        <!-- Left Panel: Reciters -->
        <div id="reciters-panel" class="h-full overflow-hidden flex flex-col relative z-0">
            <!-- Search & Filters -->
            <div class="flex flex-col sticky top-0 z-10 glass border-b border-gold-200 bg-white/80 dark:border-dark-700 dark:bg-dark-900/80" id="filter-bar">
                <div class="p-4 pb-2">
                    <div class="relative">
                        <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gold-500 dark:text-gold-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        <input 
                            type="text" 
                            id="search-input"
                            oninput="handleSearch(this.value)"
                            placeholder="ابحث عن قارئ..."
                            class="w-full pr-10 pl-4 py-2 rounded-full border bg-transparent focus:outline-none focus:ring-2 border-gold-200 text-dark-900 focus:border-gold-500 focus:ring-gold-500/20 placeholder-gold-400 dark:border-dark-600 dark:text-white dark:placeholder-dark-500"
                        />
                    </div>
                </div>

                <div class="px-4 pb-3 pt-1">
                    <div class="flex gap-2 overflow-x-auto no-scrollbar" id="alphabet-container">
                        <!-- Alphabet buttons injected here -->
                    </div>
                </div>
            </div>

            <!-- Reciters List Container -->
            <div class="flex-1 overflow-y-auto p-4" id="reciters-list-container">
                <!-- Reciter cards/items injected here -->
                <div class="flex items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-t-transparent border-gold-500"></div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Surahs -->
        <div id="surahs-panel" class="h-full border-r transition-colors duration-300 relative z-10 bg-white border-gold-200 dark:bg-dark-900 dark:border-dark-700 hidden md:flex flex-col">
            <!-- Mobile Back Header -->
            <div id="mobile-surah-header" class="p-4 border-b flex items-center gap-2 border-gold-200 dark:border-dark-700 md:hidden">
                <button onclick="closeSurahPanel()" class="p-2 rounded-full bg-gold-100 text-gold-600 dark:bg-dark-800 dark:text-gold-400">
                    <svg class="w-5 h-5 transform rotate-180" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <span id="mobile-reciter-name" class="font-bold text-gold-600 dark:text-gold-400">اسم القارئ</span>
            </div>

            <!-- Moshaf Selector Container -->
            <div id="moshaf-selector-container" class="p-4 border-b border-gold-200 dark:border-dark-700 hidden">
                <!-- Dropdown injected here -->
            </div>

            <!-- Surah list scrollable container -->
            <div class="flex-1 overflow-y-auto p-2" id="surah-list-container">
                <div class="flex flex-col items-center justify-center h-full opacity-50 p-8 text-center text-dark-900 dark:text-white">
                    <div class="text-6xl mb-4 text-gold-500 dark:text-gold-400">📖</div>
                    <p>اختر قارئاً لعرض السور</p>
                </div>
            </div>
        </div>
    </main>

    <!-- PLAYER -->
    <div id="audio-player-container" class="fixed bottom-0 left-0 w-full p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.3)] backdrop-blur-lg border-t bg-white border-gold-300 dark:bg-dark-900 dark:border-gold-600 z-50 transition-all duration-500 hidden">
        <audio id="main-audio"></audio>
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex-1 min-w-0 w-full md:w-auto text-center md:text-right">
                <h4 id="player-surah-name" class="font-bold truncate text-gold-500 dark:text-gold-400 text-lg">اسم السورة</h4>
                <p id="player-reciter-name" class="text-xs truncate text-gray-600 dark:text-gray-400">اسم القارئ</p>
            </div>

            <div class="flex items-center gap-6 my-2 md:my-0">
                <button onclick="playPrev()" class="text-gray-500 hover:text-gold-500 dark:text-gray-400 dark:hover:text-gold-500 transition">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button onclick="togglePlay()" id="player-play-btn" class="w-14 h-14 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition active:scale-95 bg-gold-500 text-white border-2 border-gold-400">
                    <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button onclick="playNext()" class="text-gray-500 hover:text-gold-500 dark:text-gray-400 dark:hover:text-gold-500 transition">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="w-full md:w-1/3 flex items-center gap-3">
                <span id="player-time-current" class="text-[10px] font-mono w-10 text-left text-gray-500 dark:text-gray-400">00:00</span>
                <div class="flex-1 relative group py-2">
                    <input 
                        type="range" 
                        id="player-progress" 
                        min="0" 
                        max="100" 
                        value="0" 
                        oninput="seekAudio(this.value)"
                        class="w-full h-1 bg-gray-300 dark:bg-gray-700 rounded-lg cursor-pointer accent-gold-500"
                    />
                </div>
                <span id="player-time-duration" class="text-[10px] font-mono w-10 text-gray-500 dark:text-gray-400">00:00</span>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // --- CONSTANTS & API ---
        const API_BASE_URL = 'https://mp3quran.net/api/v3';
        const ARABIC_LETTERS = [
            'الكل', 'أ', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 'ض', 'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 'ك', 'ل', 'م', 'ن', 'ه', 'و', 'ي'
        ];

        // --- STATE ---
        let state = {
            theme: 'dark',
            viewMode: 'grid',
            reciters: [],
            filteredReciters: [],
            surahMap: new Map(),
            selectedReciter: null,
            playlist: [],
            currentTrackIndex: null,
            filterText: '',
            selectedLetter: 'الكل',
            isLoadingSurahs: false,
            availableMoshafs: [],
            selectedMoshafIndex: 0
        };

        // --- DOM ELEMENTS ---
        const audioEl = document.getElementById('main-audio');
        const playBtn = document.getElementById('player-play-btn');
        const progressSlider = document.getElementById('player-progress');
        const currentTimeText = document.getElementById('player-time-current');
        const durationTimeText = document.getElementById('player-time-duration');

        // --- INIT ---
        window.addEventListener('DOMContentLoaded', async () => {
            initAudioEvents();
            renderAlphabet();
            await loadInitialData();
        });

        async function loadInitialData() {
            try {
                const [recitersData, suwarData] = await Promise.all([
                    fetchReciters(),
                    fetchSurahNames()
                ]);

                // Map suwar for easy name lookup
                suwarData.forEach(s => state.surahMap.set(s.id, s));

                // Process reciters
                state.reciters = recitersData.map(r => ({
                    ...r,
                    letter: r.name.trim().charAt(0),
                    listeners: Math.floor(Math.sin(r.id) * 200000) + 300000 // stable pseudo-random rank
                }));

                state.filteredReciters = [...state.reciters];
                renderReciters();
            } catch (error) {
                console.error("Error loading initial data:", error);
            }
        }

        // --- API CALLS ---
        async function fetchReciters() {
            const response = await fetch(`${API_BASE_URL}/reciters?language=ara`);
            const data = await response.json();
            return data.reciters;
        }

        async function fetchSurahNames() {
            const response = await fetch(`${API_BASE_URL}/suwar?language=ara`);
            const data = await response.json();
            return data.suwar;
        }

        async function fetchReciterDetails(reciterId) {
            const response = await fetch(`${API_BASE_URL}/reciters?language=ara&reciter=${reciterId}`);
            const data = await response.json();
            return data.reciters[0];
        }

        // --- RENDER FUNCTIONS ---
        function renderAlphabet() {
            const container = document.getElementById('alphabet-container');
            container.innerHTML = ARABIC_LETTERS.map(letter => {
                const isActive = state.selectedLetter === letter;
                return `
                    <button
                        onclick="filterByLetter('${letter}')"
                        class="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all whitespace-nowrap
                        ${isActive 
                            ? 'bg-gold-500 text-white border-gold-600' 
                            : 'bg-white border-gold-200 text-gold-600 hover:text-gold-400 dark:bg-dark-800 dark:border-dark-600 dark:text-gray-400'}"
                        id="letter-${letter}"
                    >
                        ${letter}
                    </button>
                `;
            }).join('');
        }

        function renderReciters() {
            const container = document.getElementById('reciters-list-container');
            if (state.filteredReciters.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 opacity-50 text-dark-900 dark:text-white">
                        <p>لا يوجد قراء مطابقين للبحث</p>
                    </div>
                `;
                return;
            }

            let html = '';
            if (state.viewMode === 'grid') {
                html = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">`;
                state.filteredReciters.forEach(r => {
                    const isSelected = state.selectedReciter?.id === r.id;
                    const activeClasses = isSelected 
                        ? 'border-gold-500 bg-gold-100/50 dark:bg-dark-700/50 ring-2 ring-gold-500/20' 
                        : 'border-gold-200 bg-white hover:border-gold-500/50 dark:border-dark-700 dark:bg-dark-800 dark:hover:border-gold-500/50';
                    const textClass = 'text-dark-900 dark:text-gray-200';
                    const letterBg = 'bg-gold-50 border-gold-300 text-gold-600 dark:bg-dark-900 dark:border-gold-600 dark:text-gold-400';

                    html += `
                        <div onclick="selectReciter(${r.id})" class="cursor-pointer transition-all duration-300 rounded-2xl p-4 flex flex-col items-center text-center gap-3 border shadow-sm ${activeClasses}">
                            <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold border-2 ${letterBg}">
                                ${r.letter}
                            </div>
                            <h3 class="font-semibold text-sm line-clamp-2 ${textClass}">${r.name}</h3>
                        </div>
                    `;
                });
                html += `</div>`;
            } else if (state.viewMode === 'list') {
                html = `<div class="space-y-2">`;
                state.filteredReciters.forEach(r => {
                    const isSelected = state.selectedReciter?.id === r.id;
                    const activeClasses = isSelected 
                        ? 'border-gold-500 bg-gold-100/50 dark:bg-dark-700/50 ring-2 ring-gold-500/20' 
                        : 'border-gold-200 bg-white hover:border-gold-500/50 dark:border-dark-700 dark:bg-dark-800 dark:hover:border-gold-500/50';
                    const textClass = 'text-dark-900 dark:text-gray-200';
                    const letterBg = 'bg-gold-500 text-white dark:bg-gold-600';

                    html += `
                        <div onclick="selectReciter(${r.id})" class="cursor-pointer transition-all duration-300 rounded-lg p-3 flex items-center gap-4 border ${activeClasses}">
                            <div class="w-8 h-8 rounded-md flex items-center justify-center text-xs font-bold ${letterBg}">
                                ${r.letter}
                            </div>
                            <h3 class="font-medium ${textClass}">${r.name}</h3>
                        </div>
                    `;
                });
                html += `</div>`;
            } else if (state.viewMode === 'rank') {
                html = `<div class="space-y-3">`;
                const ranked = [...state.filteredReciters].sort((a, b) => b.listeners - a.listeners);
                ranked.forEach((r, idx) => {
                    const isSelected = state.selectedReciter?.id === r.id;
                    const activeClasses = isSelected 
                        ? 'border-gold-500 bg-gold-100/50 dark:bg-dark-700/50 ring-2 ring-gold-500/20' 
                        : 'border-gold-200 bg-white hover:border-gold-500/50 dark:border-dark-700 dark:bg-dark-800 dark:hover:border-gold-500/50';
                    const isTopThree = idx < 3;
                    const textClass = 'text-dark-900 dark:text-gray-100';

                    html += `
                        <div onclick="selectReciter(${r.id})" class="cursor-pointer transition-all duration-300 rounded-xl p-3 flex items-center justify-between border shadow-sm ${activeClasses}">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 flex items-center justify-center text-lg font-black italic ${isTopThree ? 'text-gold-500 dark:text-gold-400 scale-110' : 'opacity-30'}">
                                    #${idx + 1}
                                </div>
                                <div>
                                    <h3 class="font-bold ${textClass}">${r.name}</h3>
                                    <p class="text-xs opacity-60 flex items-center gap-1 text-dark-500 dark:text-gray-400">
                                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                        ${r.listeners.toLocaleString()} مستمع
                                    </p>
                                </div>
                            </div>
                            ${isTopThree ? '<svg class="w-6 h-6 text-gold-500 dark:text-gold-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>' : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        function renderMoshafSelector(moshafs) {
            const container = document.getElementById('moshaf-selector-container');
            if (!moshafs || moshafs.length <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const options = moshafs.map((m, idx) => {
                return `<option value="${idx}" ${state.selectedMoshafIndex === idx ? 'selected' : ''}>${m.name} (${m.surah_total} سورة)</option>`;
            }).join('');

            container.innerHTML = `
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gold-600 dark:text-gold-400">اختر الرواية / المصحف:</label>
                    <select onchange="changeMoshaf(this.value)" class="w-full p-2.5 rounded-xl border bg-white border-gold-200 text-dark-900 dark:bg-dark-800 dark:border-dark-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-gold-500/20 text-sm font-medium transition-all">
                        ${options}
                    </select>
                </div>
            `;
        }

        function changeMoshaf(index) {
            state.selectedMoshafIndex = parseInt(index);
            const m = state.availableMoshafs[state.selectedMoshafIndex];
            if (!m) return;

            const ids = m.surah_list.split(',').map(Number);
            state.playlist = ids.map(id => ({
                id,
                name: state.surahMap.get(id)?.name || `سورة ${id}`,
                transliteration: state.surahMap.get(id)?.transliteration || '',
                reciterName: state.selectedReciter.name,
                audioUrl: `${m.server}/${String(id).padStart(3,'0')}.mp3`
            }));
            renderSurahs();
        }

        async function selectReciter(id) {
            const reciter = state.reciters.find(r => r.id === id);
            state.selectedReciter = reciter;
            
            // Show mobile surah panel
            const surahsPanel = document.getElementById('surahs-panel');
            surahsPanel.classList.remove('hidden');
            surahsPanel.classList.add('flex', 'fixed', 'inset-0', 'md:static');
            
            document.getElementById('mobile-reciter-name').textContent = reciter.name;

            // Render loading state for surahs
            const container = document.getElementById('surah-list-container');
            container.innerHTML = `
                <div class="flex items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-t-transparent border-gold-500"></div>
                </div>
            `;

            // Hide moshaf selector during load
            document.getElementById('moshaf-selector-container').classList.add('hidden');

            // Render reciters to update active highlight
            renderReciters();

            try {
                const details = await fetchReciterDetails(reciter.id);
                if (details.moshaf && details.moshaf.length) {
                    state.availableMoshafs = details.moshaf;
                    state.selectedMoshafIndex = 0;
                    
                    renderMoshafSelector(details.moshaf);

                    const m = details.moshaf[0];
                    const ids = m.surah_list.split(',').map(Number);
                    state.playlist = ids.map(id => ({
                        id,
                        name: state.surahMap.get(id)?.name || `سورة ${id}`,
                        transliteration: state.surahMap.get(id)?.transliteration || '',
                        reciterName: reciter.name,
                        audioUrl: `${m.server}/${String(id).padStart(3,'0')}.mp3`
                    }));
                } else {
                    state.availableMoshafs = [];
                    state.selectedMoshafIndex = 0;
                    state.playlist = [];
                    renderMoshafSelector([]);
                }
                renderSurahs();
            } catch (error) {
                console.error("Error loading surahs:", error);
                container.innerHTML = `<p class="text-center text-red-500 p-4">خطأ في تحميل السور</p>`;
            }
        }

        function renderSurahs() {
            const container = document.getElementById('surah-list-container');
            if (!state.playlist.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-50 p-8 text-center text-dark-900 dark:text-white">
                        <p>لا توجد سور متوفرة لهذا القارئ</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = state.playlist.map((track, idx) => {
                const isActive = state.currentTrackIndex !== null && state.playlist[state.currentTrackIndex]?.id === track.id && state.selectedReciter?.name === track.reciterName;
                const activeClasses = isActive 
                    ? 'bg-gold-500 border-gold-600 text-white shadow-lg transform scale-[1.02]' 
                    : 'bg-white border-gold-200 hover:bg-gold-50 text-dark-900 hover:border-gold-500/50 dark:bg-dark-800 dark:border-dark-700 dark:hover:bg-dark-700 dark:text-gray-200 dark:hover:border-gold-500/50';

                return `
                    <button
                        onclick="playTrack(${idx})"
                        class="w-full text-right p-3 mb-2 rounded-lg transition-all flex items-center justify-between group border ${activeClasses}"
                    >
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-mono opacity-60 w-8 ${isActive ? 'text-white' : 'text-gold-500'}">
                                ${String(track.id).padStart(3, '0')}
                            </span>
                            <div>
                                <p class="font-semibold font-serif text-lg">${track.name}</p>
                                <p class="text-xs ${isActive ? 'text-white/80' : 'opacity-50'}">${track.transliteration}</p>
                            </div>
                        </div>
                        ${isActive ? `
                            <div class="flex gap-1 items-end h-4">
                                <div class="wave-bar bg-white" style="animation-delay: 0s"></div>
                                <div class="wave-bar bg-white" style="animation-delay: 0.2s"></div>
                                <div class="wave-bar bg-white" style="animation-delay: 0.4s"></div>
                            </div>
                        ` : ''}
                    </button>
                `;
            }).join('');
        }

        function closeSurahPanel() {
            const surahsPanel = document.getElementById('surahs-panel');
            surahsPanel.classList.add('hidden');
            surahsPanel.classList.remove('flex', 'fixed', 'inset-0', 'md:static');
        }

        // --- FILTER & SEARCH ---
        function handleSearch(val) {
            state.filterText = val.toLowerCase();
            applyFilters();
        }

        function filterByLetter(letter) {
            state.selectedLetter = letter;
            renderAlphabet();
            applyFilters();
        }

        function applyFilters() {
            state.filteredReciters = state.reciters.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(state.filterText);
                const matchesLetter = state.selectedLetter === 'الكل' || r.letter === state.selectedLetter;
                return matchesSearch && matchesLetter;
            });
            renderReciters();
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            
            // Update UI buttons
            const modes = ['grid', 'list', 'rank'];
            modes.forEach(m => {
                const btn = document.getElementById(`btn-view-${m}`);
                if (m === mode) {
                    btn.className = "p-2 rounded-lg transition-all bg-gold-500 text-white shadow-md scale-105";
                } else {
                    btn.className = "p-2 rounded-lg transition-all hover:bg-gold-100/50 dark:hover:bg-dark-700/50 opacity-60 hover:opacity-100 text-gray-600 dark:text-gray-300";
                }
            });

            renderReciters();
        }

        // --- AUDIO PLAYER LOGIC ---
        function playTrack(idx) {
            state.currentTrackIndex = idx;
            const track = state.playlist[idx];
            if (!track) return;

            audioEl.src = track.audioUrl;
            audioEl.play().catch(err => console.log("Playback interrupted or failed: ", err));

            // Show Player
            document.getElementById('audio-player-container').classList.remove('hidden');
            document.getElementById('player-surah-name').textContent = track.name;
            document.getElementById('player-reciter-name').textContent = track.reciterName;

            renderSurahs();
            updatePlayButton(true);
        }

        function togglePlay() {
            if (audioEl.paused) {
                audioEl.play();
                updatePlayButton(true);
            } else {
                audioEl.pause();
                updatePlayButton(false);
            }
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playBtn.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
            } else {
                playBtn.innerHTML = `<svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            }
        }

        // Modified playNext and playPrev to cycle through the active Moshaf playlist
        function playNext() {
            if (state.playlist.length && state.currentTrackIndex !== null) {
                let nextIdx = (state.currentTrackIndex + 1) % state.playlist.length;
                playTrack(nextIdx);
            }
        }

        function playPrev() {
            if (state.playlist.length && state.currentTrackIndex !== null) {
                let prevIdx = (state.currentTrackIndex - 1 + state.playlist.length) % state.playlist.length;
                playTrack(prevIdx);
            }
        }

        function seekAudio(value) {
            if (audioEl.duration) {
                audioEl.currentTime = (value / 100) * audioEl.duration;
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // --- AUDIO EVENTS ---
        function initAudioEvents() {
            audioEl.addEventListener('timeupdate', () => {
                if (audioEl.duration) {
                    const pct = (audioEl.currentTime / audioEl.duration) * 100;
                    progressSlider.value = pct;
                    currentTimeText.textContent = formatTime(audioEl.currentTime);
                }
            });

            audioEl.addEventListener('loadedmetadata', () => {
                durationTimeText.textContent = formatTime(audioEl.duration);
            });

            audioEl.addEventListener('ended', () => {
                playNext();
            });
        }

        // --- THEME MANAGEMENT ---
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            const html = document.documentElement;

            const moonIcon = document.getElementById('theme-icon-moon');
            const sunIcon = document.getElementById('theme-icon-sun');

            if (state.theme === 'dark') {
                html.classList.add('dark');
                moonIcon.classList.remove('hidden');
                sunIcon.classList.add('hidden');
            } else {
                html.classList.remove('dark');
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            }

            // Re-render dynamic components to apply their respective light/dark classes
            renderAlphabet();
            renderReciters();
            renderMoshafSelector(state.availableMoshafs);
            renderSurahs();
        }
    </script>
</body>
</html>
